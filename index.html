<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0F1419" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#FAF7F0" media="(prefers-color-scheme: light)" />
    <title>Sunshine Daydream BCC</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      // Apply theme before React mounts to prevent flash-of-wrong-theme.
      // Defaults to dark for Jay; persists via localStorage 'bcc-theme' key.
      (function() {
        try {
          var saved = localStorage.getItem('bcc-theme');
          var theme = (saved === 'light' || saved === 'dark') ? saved : 'dark';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
